openapi: 3.1.0
info:
  title: Invitely API
  version: 0.1.0
  summary: API para convites digitais, RSVP e gestão de eventos.
  description: >
    Contrato público inicial da plataforma Invitely. As rotas públicas usam rate
    limiting e token de convite; as rotas administrativas exigem autenticação
    via Laravel Sanctum e políticas de tenant.
servers:
  - url: http://localhost:8080/api/v1
    description: Ambiente local Docker
tags:
  - name: Público
  - name: Admin
paths:
  /events/{slug}:
    get:
      tags: [Público]
      summary: Retorna a landing pública de um evento publicado.
      parameters:
        - $ref: '#/components/parameters/EventSlug'
      responses:
        '200':
          description: Evento encontrado.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Event'
        '404':
          $ref: '#/components/responses/NotFound'
  /events/{slug}/rsvp:
    post:
      tags: [Público]
      summary: Confirma ou recusa presença usando token de convite.
      parameters:
        - $ref: '#/components/parameters/EventSlug'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RsvpRequest'
      responses:
        '201':
          description: RSVP registrado.
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /admin/events:
    get:
      tags: [Admin]
      security:
        - sanctum: []
      summary: Lista eventos do tenant autenticado.
      responses:
        '200':
          description: Lista paginada de eventos.
    post:
      tags: [Admin]
      security:
        - sanctum: []
      summary: Cria um evento para o tenant autenticado.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventCreateRequest'
      responses:
        '201':
          description: Evento criado.
        '422':
          $ref: '#/components/responses/ValidationError'
  /admin/events/{event}/analytics:
    get:
      tags: [Admin]
      security:
        - sanctum: []
      summary: Retorna métricas operacionais de RSVP e check-in.
      parameters:
        - name: event
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Métricas do evento.
components:
  securitySchemes:
    sanctum:
      type: http
      scheme: bearer
  parameters:
    EventSlug:
      name: slug
      in: path
      required: true
      schema:
        type: string
        example: invitely-launch-night
  responses:
    NotFound:
      description: Recurso não encontrado.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ValidationError:
      description: Erro de validação.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'
  schemas:
    Event:
      type: object
      required: [id, name, slug, status, starts_at, timezone, hero, content, theme, gallery]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        status:
          type: string
          enum: [draft, published, archived]
        starts_at:
          type: string
          format: date-time
        ends_at:
          type: [string, 'null']
          format: date-time
        timezone:
          type: string
        venue:
          type: object
          properties:
            name:
              type: [string, 'null']
            address:
              type: [string, 'null']
        spotify_playlist_url:
          type: [string, 'null']
          format: uri
        hero:
          type: object
        content:
          type: object
        theme:
          type: object
        gallery:
          type: array
          items:
            type: object
    RsvpRequest:
      type: object
      required: [invite_token, status, companions]
      properties:
        invite_token:
          type: string
          example: demo-invite-token
        status:
          type: string
          enum: [accepted, declined]
        companions:
          type: integer
          minimum: 0
          maximum: 20
        message:
          type: [string, 'null']
          maxLength: 1000
        answers:
          type: [object, 'null']
    EventCreateRequest:
      type: object
      required: [name, starts_at, timezone, hero, content, theme]
      properties:
        name:
          type: string
          maxLength: 160
        slug:
          type: string
        starts_at:
          type: string
          format: date-time
        ends_at:
          type: [string, 'null']
          format: date-time
        timezone:
          type: string
          example: America/Sao_Paulo
        hero:
          type: object
        content:
          type: object
        theme:
          type: object
    Error:
      type: object
      required: [message]
      properties:
        message:
          type: string
    ValidationError:
      type: object
      required: [message, errors]
      properties:
        message:
          type: string
        errors:
          type: object
