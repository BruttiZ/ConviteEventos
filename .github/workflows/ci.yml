name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: invitely_test
          POSTGRES_USER: invitely
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U invitely -d invitely_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: bcmath, intl, pdo_pgsql, redis, zip
          coverage: none
          tools: composer:v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare env
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Validate Docker Compose
        run: docker compose config --quiet

      - name: Pint
        run: vendor/bin/pint --test

      - name: PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=1G

      - name: Tests
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: invitely_test
          DB_USERNAME: invitely
          DB_PASSWORD: secret
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
        run: php artisan test

      - name: Frontend lint
        run: npm run lint

      - name: Frontend format
        run: npm run format:check

      - name: Frontend typecheck
        run: npm run typecheck

      - name: Frontend build
        run: npm run build

      - name: Commit messages
        if: github.event_name == 'pull_request'
        run: npx commitlint --from origin/${{ github.base_ref }} --to HEAD
