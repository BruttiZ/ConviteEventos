services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html
      - build-data:/var/www/html/public/build:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
      node:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/up >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - invitely

  app:
    build:
      context: .
      target: app
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: invitely
      DB_USERNAME: invitely
      DB_PASSWORD: secret
      REDIS_HOST: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      AWS_ACCESS_KEY_ID: invitely
      AWS_SECRET_ACCESS_KEY: invitely-secret
      AWS_DEFAULT_REGION: us-east-1
      AWS_BUCKET: invitely
      AWS_ENDPOINT: http://minio:9000
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      RUN_SEEDERS: "true"
    volumes:
      - ./:/var/www/html
      - vendor-data:/var/www/html/vendor
      - build-data:/var/www/html/public/build
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "php artisan about --only=environment >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - invitely

  queue:
    build:
      context: .
      target: app
    command: php artisan queue:work --tries=3 --backoff=5
    environment:
      RUN_MIGRATIONS: "false"
      RUN_SEEDERS: "false"
      DB_HOST: postgres
      DB_DATABASE: invitely
      DB_USERNAME: invitely
      DB_PASSWORD: secret
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    volumes:
      - ./:/var/www/html
      - vendor-data:/var/www/html/vendor
      - build-data:/var/www/html/public/build
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - invitely

  node:
    image: node:22-alpine
    working_dir: /var/www/html
    command: sh -lc "npm install && npm run build && npm run dev -- --host 0.0.0.0"
    ports:
      - "${VITE_PORT:-5174}:5173"
    volumes:
      - ./:/var/www/html
      - node-modules:/var/www/html/node_modules
      - build-data:/var/www/html/public/build
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173/@vite/client >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - invitely

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: invitely
      POSTGRES_USER: invitely
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invitely -d invitely"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - invitely

  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - invitely

  mailpit:
    image: axllent/mailpit:v1.21
    ports:
      - "${MAILPIT_PORT:-8025}:8025"
    networks:
      - invitely

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: invitely
      MINIO_ROOT_PASSWORD: invitely-secret
    volumes:
      - minio-data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - invitely

networks:
  invitely:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
  vendor-data:
  build-data:
  node-modules:
